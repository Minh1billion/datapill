name: Publish to PyPI

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Bump version and tag
        run: |
          # Lấy version hiện tại từ pyproject.toml (nguồn sự thật)
          OLD=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "=== OLD version from pyproject.toml: $OLD ==="

          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          PATCH=$(echo $OLD | cut -d. -f3)
          MSG="${{ github.event.head_commit.message }}"

          if echo "$MSG" | grep -qE '^feat\(release\)[: ]'; then
            NEW="$((MAJOR + 1)).0.0"
          elif echo "$MSG" | grep -qE '^feat\(update\)[: ]'; then
            NEW="$MAJOR.$((MINOR + 1)).0"
          else
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          echo "OLD=$OLD  NEW=$NEW"
          sed -i "s/^version = \"$OLD\"/version = \"$NEW\"/" pyproject.toml
          grep '^version' pyproject.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml

          # Chỉ commit nếu có thay đổi
          git diff --cached --quiet || git commit -m "chore: bump version to $NEW [skip ci]"
          git push origin main

          # Xóa tag cũ nếu tồn tại rồi tạo lại
          git tag -d "$NEW" 2>/dev/null || true
          git push origin ":refs/tags/$NEW" 2>/dev/null || true
          git tag "$NEW"
          git push origin "$NEW"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PUBLISH_KEY }}