name: Publish to PyPI

on:
  push:
    branches:
      - main
    paths-ignore:
      - pyproject.toml

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Bump version
        run: |
          OLD=$(grep '^version' pyproject.toml | head -1 | grep -oP '[\d]+\.[\d]+\.[\d]+')

          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          PATCH=$(echo $OLD | cut -d. -f3)

          MSG="${{ github.event.head_commit.message }}"

          if echo "$MSG" | grep -qE '^feat\(release\)[: ]'; then
            NEW="$((MAJOR + 1)).0.0"
          elif echo "$MSG" | grep -qE '^feat\(update\)[: ]'; then
            NEW="$MAJOR.$((MINOR + 1)).0"
          else
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          fi

          sed -i "s/^version = \"$OLD\"/version = \"$NEW\"/" pyproject.toml
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml
          git commit -m "chore: bump version to $NEW_VERSION" || exit 0

          git pull --rebase origin main
          git push

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PUBLISH_KEY }}